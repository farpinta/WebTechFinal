<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill-Share — Workshop Catalog</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- nav-username / nav-login / nav-logout wired by auth.js
       cart-count updated by catalog.js on every addToCart event -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html">Skill-Share</a>
      <div class="navbar-nav ms-auto align-items-center gap-2">
        <span id="nav-username" class="navbar-text text-white-50 small"></span>
        <a href="/checkout.html" class="nav-link position-relative">
          Cart
          <span id="cart-count"
                class="badge bg-primary rounded-pill ms-1">0</span>
        </a>
        <a id="nav-login"  href="/login.html"    class="nav-link">Login</a>
        <a id="nav-logout" href="#"              class="nav-link">Logout</a>
        <a href="/register.html" class="btn btn-sm btn-outline-light ms-1">
          Register
        </a>
      </div>
    </div>
  </nav>

  <header class="catalog-hero py-5 text-center bg-dark text-white">
    <div class="container">
      <h1 class="catalog-hero__title display-5 fw-bold">Find Your Next Skill</h1>
      <p  class="catalog-hero__subtitle lead text-white-50">
        Live online workshops taught by real experts
      </p>
      <!-- Search — Farsai wires 300ms debounce; loadCatalog() is the callback -->
      <input id="search-input"
             type="search"
             class="form-control form-control-lg w-50 mx-auto mt-3"
             placeholder="Search workshops…"
             aria-label="Search workshops" />
    </div>
  </header>

  <!-- Category filter — Farsai builds filter buttons;
       each calls loadCatalog(category) from catalog.js -->
  <section class="container mt-4">
    <div id="category-tabs" class="d-flex gap-2 flex-wrap" role="tablist"></div>
  </section>

  <main class="container mt-4 pb-5">

    <!-- Skeleton loader — Arm toggles hidden; Farsai styles the cards -->
    <div id="catalog-skeleton"
         class="row row-cols-1 row-cols-md-3 g-4"
         aria-busy="true"
         aria-label="Loading workshops">
    </div>

    <!-- Error state -->
    <div id="catalog-error"
         class="alert alert-danger"
         role="alert"
         hidden></div>

    <!-- Live workshop cards — fully rendered by catalog.js
         Zero hard-coded content (architectural best practice #2) -->
    <div id="catalog"
         class="row row-cols-1 row-cols-md-3 g-4"
         aria-live="polite"
         aria-label="Workshop catalog">
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/catalog.js"></script>
</body>
</html>
