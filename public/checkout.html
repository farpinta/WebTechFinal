<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Skill-Share</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html">Skill-Share</a>
      <div class="navbar-nav ms-auto align-items-center gap-2">
        <span id="nav-username" class="navbar-text text-white-50 small"></span>
        <a id="nav-login"  href="/login.html" class="nav-link">Login</a>
        <a id="nav-logout" href="#"           class="nav-link">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="h3 mb-4">Checkout</h1>

    <!-- 409 / validation / server error banner -->
    <div id="checkout-error"
         class="alert alert-danger"
         role="alert"
         hidden></div>

    <!-- Success confirmation (shown after 201, replaces the form) -->
    <div id="checkout-success"
         class="alert alert-success"
         role="status"
         hidden></div>

    <form id="checkout-form" novalidate>
      <div class="row g-4">

        <!-- Order summary table — hydrated from cart[] by checkout.js -->
        <div class="col-12 col-lg-7">
          <h2 class="h5 mb-3">Order Summary</h2>
          <table class="table table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th>Workshop</th>
                <th class="text-center" style="width:80px">Qty</th>
                <th class="text-end"    style="width:120px">Subtotal</th>
              </tr>
            </thead>
            <!-- Each <tr> gets data-workshop-id so checkout.js can
                 add class="table-danger" on the 409 row. -->
            <tbody id="summary-items"></tbody>
            <tfoot>
              <tr class="fw-bold">
                <td colspan="2">Total</td>
                <td class="text-end" id="summary-total">฿0</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <!-- Payment details -->
        <div class="col-12 col-lg-5">
          <h2 class="h5 mb-3">Payment</h2>
          <div class="mb-3">
            <label for="card_number" class="form-label">Card number</label>
            <input id="card_number"
                   name="card_number"
                   type="text"
                   class="form-control"
                   inputmode="numeric"
                   autocomplete="cc-number"
                   placeholder="•••• •••• •••• ____"
                   maxlength="19"
                   required />
            <div class="form-text">Only the last 4 digits are stored.</div>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2">
            Confirm Booking
          </button>
        </div>

      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/checkout.js"></script>
</body>
</html>
